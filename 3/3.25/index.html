<!DOCTYPE html>
<html>
    <head>
        <title>F8 - Shop</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="main.css">
        <style>
            *{
                margin: 0;
            }
            .box{
                width: 100%;
                height: 120px;
                background-color: rgb(190, 124, 157);
            }

            h1:hover{
                color:red;
            }

            .box:active{
                background-color: #333;
            }

            li:first-child{
                color:red;
            }
            li:last-child{
                color:red;
            }
        </style>
    </head>

    <body>
        <div class="box"></div>

        <h1>CSS pseudo-classes</h1>
        <ul>
            <li>:root (Chọn phần tử gốc tài liệu (thẻ html).)</li>
            <li>:hover ( Khi di chuột qua phần tử.)</li>
            <li>:active (Khi đang nhấn giữ chuột trên phần tử. )</li>
            <li>:first-child (Chọn phần tử con đầu tiên của cha.)</li>
            <li>:last-child (Chọn phần tử con cuối cùng của cha.)</li>
        </ul>
    </body>
</html>
