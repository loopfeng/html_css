<!DOCTYPE html>
<html>
    <head>
        <title>F8 - Shop</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="main.css">
        <style>
            *{
                margin: 0;
            }
            .box{
                width: 100%;
                height: 120px;
                background-color: rgb(190, 124, 157);
            }

            ::selection{
                background-color: violet;
                color: #fff;
            }
        </style>
    </head>

    <body>
        <div class="box"></div>

        <h1>CSS pseudo-classes <br />Dong thu 2</h1>
        <ul>
            <li>::before</li>
            <li>::after</li>
            <li>::first-letter</li>
            <li>::first-line</li>
            <li>::selection</li>
        </ul>
    </body>
</html>
