<!DOCTYPE html>
<html>
    <head>
        <title>F8 - Shop</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="main.css">
        <style>
            html, body{
                margin: 0;
            }

            .header{
                width: 100%;
                height: 100vh;
                /* linear là sự đều đặn , gradient là dải màu chuyển */
                /* Nếu bỏ góc xoay đi thì mặc định sẽ là 180deg */
                background-image: linear-gradient(0, rgba(255, 255, 0, 0.5), rgba(0, 0, 255, 0.5 )),
                url(https://phongvu.vn/cong-nghe/wp-content/uploads/2025/12/hinh-nen-bien-10-3.jpg);
                /* chỉnh sửa tỷ lệ ảnh */
                background-size: 100%;
                /* Bỏ đi sự lặp lại  */
                background-repeat: no-repeat;
                /* Chỉ lặp lại chiều ngang là x và chiều dọc là y */
                background-repeat: repeat-x;
            }
        </style>
    </head>

    <body>
        <div class="header"></div>
    </body>
</html>
