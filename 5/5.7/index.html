<!DOCTYPE html>
<html>
    <head>
        <title>F8 - Shop</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="main.css">
        <style>
            html, body{
                margin: 0;
            }

            .header{
                width: 50%;
                height: 100vh;
                background-image: url(https://phongvu.vn/cong-nghe/wp-content/uploads/2025/12/hinh-nen-bien-10-3.jpg);
                background-repeat: no-repeat;
                background-size: 200px;
                /* Position là vị trí của ảnh nền trong css */
                background-position: top 20px right 20px;
                /* top là cách trên
                right là cách dưới */
                /* có sử dụng các giá trị âm */
            }
        </style>
    </head>

    <body>
        <div class="header"></div>
    </body>
</html>
