<!DOCTYPE html>
<html>
    <head>
        <title>F8 - Shop</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="main.css">

        <style>
            html,body{
                margin: 0;
            }

            .box{
                width: 100px;
                height: 100px;
                color: #fff;
                background-color: darkorchid;
                padding: 12px;
                border: 2px solid #333;
                /* Nguyên tắc hoạt động của box-sizing là = tổng của border + padding + content */
                box-sizing: border-box;
            }
            .box{
                box-sizing: unset;
            }
        </style>
    </head>

    <body>
        <div class="box">
            Đây là nội dung bài viết
        </div>
    </body>
</html>
